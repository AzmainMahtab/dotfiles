$base = rgb(30, 30, 46)
$text = rgb(205, 214, 244)
$subtext = rgb(166, 173, 200)
$mauve = rgb(203, 166, 247)
$surface0 = rgb(49, 50, 68)

auth {
    fingerprint {
        enabled = true
    }
}

general {
    disable_loading_bar = true
    hide_cursor = false
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/catppuccin-mocha-base.png
    color = $base
    blur_passes = 0
}

input-field {
    monitor =
    size = 260, 50
    rounding = 0
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $mauve
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##a6adc8">Password...</span>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text
    font_size = 90
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $subtext
    font_size = 18
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $mauve
    font_size = 16
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 50
    halign = center
    valign = center
}
